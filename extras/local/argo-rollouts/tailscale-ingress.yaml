---
# Tailscale Ingress for Argo Rollouts Dashboard
# Exposes the read-only rollout UI on the Tailscale network.
# URL: https://argo-rollouts-homelab.tailc90e09.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-rollouts-homelab
  namespace: argo-rollouts
  annotations:
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  rules:
    - host: argo-rollouts-homelab.tailc90e09.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argo-rollouts-dashboard
                port:
                  number: 3100
  tls:
    - hosts:
        - argo-rollouts-homelab.tailc90e09.ts.net
