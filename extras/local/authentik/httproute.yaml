---
# HTTPRoute for Authentik via Cloudflare Tunnel
# Routes traffic from Istio Gateway to Authentik server
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: istio-system
  hostnames:
    - authentik.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          port: 80
