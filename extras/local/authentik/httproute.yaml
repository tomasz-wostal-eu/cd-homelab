---
# HTTPRoute for Authentik - public access via Cloudflare Tunnel → kgateway
# DNS managed by external-dns (gateway-httproute source) using Cloudflare Tunnel CNAME as target
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    external-dns.alpha.kubernetes.io/target: d5854df6-8267-4a84-8d51-3431d4c0c15d.cfargotunnel.com
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: http
  hostnames:
    - auth.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: authentik-server
          port: 80
          group: ""
          kind: Service
          weight: 1
