---
# Tailscale Ingress for Authentik
# Exposes Authentik UI on Tailscale network with automatic HTTPS (MagicDNS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik-homelab
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  rules:
    - host: authentik-homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
  # Tailscale provides automatic TLS via MagicDNS
  tls:
    - hosts:
        - authentik-homelab
