---
# Authentik Blueprint for Grafana OAuth2 Provider
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-grafana
  namespace: authentik
  labels:
    authentik.goauthentik.io/blueprint: "true"
data:
  grafana.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Grafana OAuth Provider
      labels:
        blueprints.goauthentik.io/description: "OAuth2 provider for Grafana"
    entries:
      # Property mappings for Grafana (groups claim)
      - model: authentik_providers_oauth2.scopemapping
        id: grafana-groups-scope
        attrs:
          name: "Grafana: Groups Scope"
          scope_name: groups
          expression: |
            return [group.name for group in user.ak_groups.all()]

      # OAuth2 Provider
      - model: authentik_providers_oauth2.oauth2provider
        id: grafana-provider
        identifiers:
          name: Grafana
        attrs:
          name: Grafana
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: grafana
          client_secret: !Env GRAFANA_OAUTH_CLIENT_SECRET
          redirect_uris: |
            https://grafana.devopslaboratory.org/login/generic_oauth
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          access_token_validity: hours=1
          refresh_token_validity: days=30
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !KeyOf grafana-groups-scope
          sub_mode: user_email

      # Application
      - model: authentik_core.application
        id: grafana-app
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: https://grafana.devopslaboratory.org
          meta_icon: https://grafana.com/static/assets/img/fav32.png
          policy_engine_mode: any
