---
# ExternalSecret for Telegraf credentials from Azure Key Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homelab-telegraf-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: homelab-telegraf-credentials
    creationPolicy: Owner
  data:
    - secretKey: INFLUX_TOKEN
      remoteRef:
        key: homelab-influxdb-token
    # MQTT password for direct connection to Home Assistant
    - secretKey: MQTT_PASSWORD
      remoteRef:
        key: emqx-bridge-password
