---
# DNSEndpoint for External DNS - creates CNAME to Cloudflare Tunnel
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: argocd-dns
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  endpoints:
    - dnsName: cd.devopslaboratory.org
      recordTTL: 300
      recordType: CNAME
      targets:
        - d5854df6-8267-4a84-8d51-3431d4c0c15d.cfargotunnel.com
---
# HTTPRoute for ArgoCD via Istio Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-cloudflare
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: istio-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - cd.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
          group: ""
          kind: Service
          weight: 1
