# ExternalSecret for ArgoCD OIDC client secret from Azure Key Vault
# Prerequisites:
#   # Create OAuth2 Provider in Authentik UI and save client secret:
#   az keyvault secret set --vault-name kv-dt-dev-pc-001 \
#     --name homelab-argocd-oidc-client-secret --value "<CLIENT_SECRET>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
      data:
        oidc.authentik.clientSecret: "{{ .clientSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: homelab-argocd-oidc-client-secret
