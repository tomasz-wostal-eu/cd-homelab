---
# GHCR image registry credentials for Kargo (used by Warehouse to discover images)
# Must live in kargo-cluster-secrets so the controller can use them globally
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kargo-ghcr-image-creds
  namespace: kargo-cluster-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: kargo-ghcr-image-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: image
      data:
        repoURL: ghcr.io
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-username
    - secretKey: token
      remoteRef:
        key: ghcr-token
---
# GitHub git credentials for Kargo (used by Stage to write back image.tag to cd-homelab)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kargo-github-git-creds
  namespace: kargo-cluster-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: kargo-github-git-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: https://github.com/tomasz-wostal-eu
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-username
    - secretKey: token
      remoteRef:
        key: ghcr-token
---
# ExternalSecret for Kargo admin credentials
# Syncs Kargo admin password hash and token signing key from Azure Key Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kargo-admin-credentials
  namespace: kargo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: kargo-admin-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Plain password for reference
        password: "{{ .password }}"
        # Kargo expects these exact keys (uppercase with underscores)
        ADMIN_ACCOUNT_PASSWORD_HASH: "{{ .passwordHash }}"
        ADMIN_ACCOUNT_TOKEN_SIGNING_KEY: "{{ .tokenSigningKey }}"
  data:
    - secretKey: password
      remoteRef:
        key: kargo-admin-password
    - secretKey: passwordHash
      remoteRef:
        key: kargo-admin-password-hash
    - secretKey: tokenSigningKey
      remoteRef:
        key: kargo-token-signing-key
