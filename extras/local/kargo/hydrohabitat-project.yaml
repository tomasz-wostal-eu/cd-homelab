---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# PromotionTask: reusable steps for all stages
# Updates image.tag in values file and triggers ArgoCD sync
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: hydrohabitat-promote
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  vars:
    - name: gitopsRepo
      value: https://github.com/tomasz-wostal-eu/cd-homelab.git
    - name: imageRepo
      value: ghcr.io/tomasz-wostal-eu/hydrohabitat
  steps:
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitopsRepo }}
        checkout:
          - branch: main
            path: ./repo

    - uses: yaml-update
      as: update
      config:
        path: repo/values/hydrohabitat/local/${{ ctx.stage }}/values.yaml
        updates:
          - key: image.tag
            value: ${{ imageFrom(vars.imageRepo).Tag }}

    - uses: git-commit
      as: commit
      config:
        path: ./repo
        message: |
          chore(hydrohabitat): promote ${{ ctx.stage }} to ${{ imageFrom(vars.imageRepo).Tag }}

    - uses: git-push
      config:
        path: ./repo
        targetBranch: main

    - uses: argocd-update
      config:
        apps:
          - name: hydrohabitat-${{ ctx.stage }}
            namespace: argocd
            sources:
              - repoURL: https://github.com/tomasz-wostal-eu/cd-homelab.git
                desiredCommitFromStep: commit
---
# Warehouse: watches sha-* tags from GHCR
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: hydrohabitat
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/tomasz-wostal-eu/hydrohabitat
        imageSelectionStrategy: Lexical
        allowTags: ^sha-
---
# Stage: homelab — receives Freight directly from Warehouse
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: homelab
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: green
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hydrohabitat
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - task:
            name: hydrohabitat-promote
---
# Stage: pr — receives Freight from homelab
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: pr
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: blue
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hydrohabitat
      sources:
        stages:
          - homelab
  promotionTemplate:
    spec:
      steps:
        - task:
            name: hydrohabitat-promote
---
# Stage: dev — receives Freight from pr
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hydrohabitat
      sources:
        stages:
          - pr
  promotionTemplate:
    spec:
      steps:
        - task:
            name: hydrohabitat-promote
---
# Stage: qa — receives Freight from dev
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: qa
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: orange
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hydrohabitat
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - task:
            name: hydrohabitat-promote
---
# Stage: prod — receives Freight from qa, manual promotion
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kargo.akuity.io/color: red
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: hydrohabitat
      sources:
        stages:
          - qa
  promotionTemplate:
    spec:
      steps:
        - task:
            name: hydrohabitat-promote
