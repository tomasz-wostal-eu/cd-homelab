---
# Wildcard TLS certificate for devopslaboratory.org
# Issued by homelab-ca-issuer (self-signed CA)
# Cloudflare Full SSL mode handles trust to end clients
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-wildcard-tls
  namespace: kgateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: homelab-wildcard-tls
  dnsNames:
    - "*.devopslaboratory.org"
    - "devopslaboratory.org"
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
