---
# Main homelab Gateway using kgateway
# LoadBalancer IP provisioned by MetalLB (172.21.255.x range)
# TLS terminated by cert-manager (homelab-ca-issuer) - Cloudflare Full SSL handles client trust
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: kgateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: homelab-wildcard-tls
            namespace: kgateway-system
      allowedRoutes:
        namespaces:
          from: All
