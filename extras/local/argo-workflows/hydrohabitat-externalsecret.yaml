---
# ExternalSecret for Hydrohabitat Git SSH credentials
# Uses the same Codeberg SSH key as iac-hetzner
# If you need a separate key:
#   az keyvault secret set --vault-name kv-dt-dev-pc-001 --name hydrohabitat-ssh-private-key --file ~/.ssh/id_rsa_codeberg
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-git-ssh
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: hydrohabitat
    app.kubernetes.io/component: ci-cd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-git-ssh
    creationPolicy: Owner
  data:
    - secretKey: id_rsa
      remoteRef:
        key: iac-hetzner-ssh-private-key
---
# ExternalSecret for GHCR (GitHub Container Registry) credentials
# Prerequisites:
#   # Create dockerconfigjson for GHCR
#   GHCR_USER="tomasz-wostal-eu"
#   GHCR_TOKEN="ghp_xxxx"  # PAT with write:packages scope
#   kubectl create secret docker-registry ghcr-creds \
#     --docker-server=ghcr.io \
#     --docker-username=$GHCR_USER \
#     --docker-password=$GHCR_TOKEN \
#     --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > /tmp/ghcr-dockerconfig.json
#   az keyvault secret set --vault-name kv-dt-dev-pc-001 --name ghcr-dockerconfig --file /tmp/ghcr-dockerconfig.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-ghcr-credentials
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: hydrohabitat
    app.kubernetes.io/component: ci-cd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: ghcr-dockerconfig
---
# ExternalSecret for GitOps repo SSH credentials (for updating values)
# Prerequisites:
#   az keyvault secret set --vault-name kv-dt-dev-pc-001 --name gitops-ssh-private-key --file ~/.ssh/id_rsa_gitops
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-gitops-ssh
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: hydrohabitat
    app.kubernetes.io/component: ci-cd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-gitops-ssh
    creationPolicy: Owner
  data:
    - secretKey: id_rsa
      remoteRef:
        key: argocd-cd-homelab-ssh-key
