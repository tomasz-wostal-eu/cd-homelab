---
# SSO RBAC - Admin ServiceAccount for all authenticated users
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-admin
  namespace: argo-workflows
  annotations:
    # Match all authenticated users (any email)
    workflows.argoproj.io/rbac-rule: "true"
    workflows.argoproj.io/rbac-rule-precedence: "1"
---
# Secret for SSO admin ServiceAccount (required since K8s 1.24)
apiVersion: v1
kind: Secret
metadata:
  name: sso-admin-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-admin
type: kubernetes.io/service-account-token
---
# ClusterRoleBinding to give sso-admin full access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflows-sso-admin
subjects:
  - kind: ServiceAccount
    name: sso-admin
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
---
# Allow argo-events sensor to create workflows in argo-workflows namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-workflow-creator
  namespace: argo-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-workflow-creator-binding
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events
roleRef:
  kind: Role
  name: argo-events-workflow-creator
  apiGroup: rbac.authorization.k8s.io
---
# ServiceAccount for running workflows in argo-workflows namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-sa
  namespace: argo-workflows
---
# Role for workflow execution
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflows-executor
  namespace: argo-workflows
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflows-executor-binding
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sa
    namespace: argo-workflows
roleRef:
  kind: Role
  name: argo-workflows-executor
  apiGroup: rbac.authorization.k8s.io
