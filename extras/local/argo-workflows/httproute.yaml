---
# HTTPRoute for Argo Workflows - public access via envoy-gateway
# Replaces: cloudflare-ingress.yaml (Istio Gateway + DNSEndpoint)
# DNS managed by external-dns watching gateway-httproute source
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-workflows
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: http
  hostnames:
    - workflows.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argo-workflows-server
          port: 2746
          group: ""
          kind: Service
          weight: 1
