---
# ExternalSecret for Hetzner IaC workflow credentials
# Aggregates all credentials needed for Hetzner infrastructure pipelines
# Prerequisites in Azure Key Vault:
#   iac-hetzner-ssh-private-key     - SSH private key for Hetzner servers
#   iac-hetzner-hcloud-token        - Hetzner Cloud API token
#   hetzner-s3-access-key-id        - Hetzner Object Storage access key
#   hetzner-s3-secret-access-key    - Hetzner Object Storage secret key
#   codeberg-api-token              - Codeberg API token for IaC repos
#   tailscale-github-actions        - Tailscale auth key for GitHub Actions
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-workflows-secrets
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: argo-workflows
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: argo-workflows-secrets
    creationPolicy: Owner
  data:
    - secretKey: ssh-private-key
      remoteRef:
        key: iac-hetzner-ssh-private-key
    - secretKey: hcloud-token
      remoteRef:
        key: iac-hetzner-hcloud-token
    - secretKey: aws-access-key-id
      remoteRef:
        key: hetzner-s3-access-key-id
    - secretKey: aws-secret-access-key
      remoteRef:
        key: hetzner-s3-secret-access-key
    - secretKey: codeberg-token
      remoteRef:
        key: codeberg-api-token
    - secretKey: tailscale-auth-key
      remoteRef:
        key: tailscale-github-actions
