---
# Kargo image registry credentials — used by Kargo Warehouse to discover new image tags
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kargo-ghcr-image-creds
  namespace: hydrohabitat
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: kargo-ghcr-image-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: image
      data:
        repoURL: ghcr.io
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-username
    - secretKey: token
      remoteRef:
        key: ghcr-token
---
# GHCR pull secret — used by the Rollout/Deployment to pull the container image
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-ghcr-credentials
  namespace: hydrohabitat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: ghcr-dockerconfig
---
# S3 credentials for CNPG WAL archiving to Hetzner Object Storage
# Required key in Azure Key Vault: 'hydrohabitat-s3-credentials' (object with accessKeyId + secretAccessKey)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-s3-credentials
  namespace: hydrohabitat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: hydrohabitat-s3-credentials
        property: accessKeyId
    - secretKey: secretAccessKey
      remoteRef:
        key: hydrohabitat-s3-credentials
        property: secretAccessKey
