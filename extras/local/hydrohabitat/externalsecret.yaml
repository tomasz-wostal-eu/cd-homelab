---
# GHCR pull secret — used by the Rollout/Deployment to pull the container image
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrohabitat-ghcr-credentials
  namespace: hydrohabitat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: hydrohabitat-ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: ghcr-dockerconfig
