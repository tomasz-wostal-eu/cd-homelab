---
# Tailscale Ingress for HydroHabitat
# Exposes the app on the Tailscale network — private access only.
# URL: https://hydrohabitat-homelab.tailc90e09.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydrohabitat-homelab
  namespace: hydrohabitat
  annotations:
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  rules:
    - host: hydrohabitat-homelab.tailc90e09.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hydrohabitat
                port:
                  number: 8000
  tls:
    - hosts:
        - hydrohabitat-homelab.tailc90e09.ts.net
