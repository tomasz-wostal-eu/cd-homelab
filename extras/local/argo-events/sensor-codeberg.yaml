---
# Sensor for Codeberg PUSH events - iac-hetzner repository
#
# Push to develop/next/beta/alpha/feature/*/feat/*/fix/*/hotfix/*/release/*:
#   → terraform-plan (dry-run)
#
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: codeberg-iac-hetzner-push
  namespace: argo-events
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: push-dev-branch
      eventSourceName: codeberg
      eventName: iac-hetzner-push
      filters:
        script: |-
          -- Filter push events to non-main branches
          local ref = event.body.ref or ""
          local branch = ref:gsub("refs/heads/", "")

          -- Match allowed branches
          local allowed_patterns = {
            "^develop$",
            "^next$",
            "^beta$",
            "^alpha$",
            "^feature/",
            "^feat/",
            "^fix/",
            "^hotfix/",
            "^release/"
          }

          for _, pattern in ipairs(allowed_patterns) do
            if branch:match(pattern) then
              return true
            end
          end

          return false
      transform:
        script: |-
          -- Transform ref to branch name (strip refs/heads/ prefix)
          local ref = event.body.ref or ""
          event.body.branch = ref:gsub("refs/heads/", "")
          return event

  triggers:
    - template:
        name: terraform-plan-dev-branch
        conditions: "push-dev-branch"
        conditionsReset:
          - byTime:
              cron: "* * * * *"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: iac-hetzner-plan-
                namespace: argo-workflows
                labels:
                  workflows.argoproj.io/workflow-template: terraform-plan
                  app.kubernetes.io/part-of: iac-hetzner
                  trigger: push
              spec:
                serviceAccountName: argo-infra
                workflowTemplateRef:
                  name: terraform-plan
                arguments:
                  parameters:
                    - name: repo-url
                      value: "ssh://git@codeberg.org/mistwolftech/iac-hetzner.git"
                    - name: branch
                      value: ""
                    - name: commit-sha
                      value: ""
                    - name: pr-number
                      value: ""
          parameters:
            # Use transformed branch name (refs/heads/ stripped by transform)
            - src:
                dependencyName: push-dev-branch
                dataKey: body.branch
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: push-dev-branch
                dataKey: body.after
              dest: spec.arguments.parameters.2.value
      retryStrategy:
        steps: 3
---
# Sensor for Codeberg PR opened/synchronized events - iac-hetzner repository
#
# Pull Request opened/synchronized to main:
#   → terraform-plan (dry-run with PR comment)
#
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: codeberg-iac-hetzner-pr-plan
  namespace: argo-events
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: pr-to-main
      eventSourceName: codeberg
      eventName: iac-hetzner-pr
      filters:
        data:
          - path: body.action
            type: string
            value:
              - "opened"
              - "synchronize"
          - path: body.pull_request.base.ref
            type: string
            value:
              - "main"

  triggers:
    - template:
        name: terraform-plan-pr-main
        conditions: "pr-to-main"
        conditionsReset:
          - byTime:
              cron: "* * * * *"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: iac-hetzner-pr-plan-
                namespace: argo-workflows
                labels:
                  workflows.argoproj.io/workflow-template: terraform-plan
                  app.kubernetes.io/part-of: iac-hetzner
                  trigger: pull-request
              spec:
                serviceAccountName: argo-infra
                workflowTemplateRef:
                  name: terraform-plan
                arguments:
                  parameters:
                    - name: repo-url
                      value: "ssh://git@codeberg.org/mistwolftech/iac-hetzner.git"
                    - name: branch
                      value: ""
                    - name: commit-sha
                      value: ""
                    - name: pr-number
                      value: ""
          parameters:
            - src:
                dependencyName: pr-to-main
                dataKey: body.pull_request.head.ref
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: pr-to-main
                dataKey: body.pull_request.head.sha
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: pr-to-main
                dataKey: body.pull_request.number
                dataTemplate: "{{ .Input }}"
              dest: spec.arguments.parameters.3.value
      retryStrategy:
        steps: 3
---
# Sensor for Codeberg PR merged events - iac-hetzner repository
#
# Pull Request merged to main:
#   → terraform-apply (full deployment)
#
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: codeberg-iac-hetzner-pr-apply
  namespace: argo-events
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: pr-merged-to-main
      eventSourceName: codeberg
      eventName: iac-hetzner-pr
      filters:
        data:
          - path: body.action
            type: string
            value:
              - "closed"
          - path: body.pull_request.merged
            type: bool
            value:
              - "true"
          - path: body.pull_request.base.ref
            type: string
            value:
              - "main"

  triggers:
    - template:
        name: terraform-apply-merged
        conditions: "pr-merged-to-main"
        conditionsReset:
          - byTime:
              cron: "* * * * *"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: iac-hetzner-apply-
                namespace: argo-workflows
                labels:
                  workflows.argoproj.io/workflow-template: terraform-apply
                  app.kubernetes.io/part-of: iac-hetzner
                  trigger: pr-merged
              spec:
                serviceAccountName: argo-infra
                workflowTemplateRef:
                  name: terraform-apply
                arguments:
                  parameters:
                    - name: repo-url
                      value: "ssh://git@codeberg.org/mistwolftech/iac-hetzner.git"
                    - name: branch
                      value: "main"
                    - name: commit-sha
                      value: ""
                    - name: skip-ansible
                      value: "false"
                    - name: auto-approve
                      value: "true"
                    - name: environment
                      value: "production"
          parameters:
            - src:
                dependencyName: pr-merged-to-main
                dataKey: body.pull_request.merge_commit_sha
              dest: spec.arguments.parameters.2.value
      retryStrategy:
        steps: 3
