---
# HTTPRoute for Argo Events webhook endpoint - public access via envoy-gateway
# Replaces: cloudflare-ingress.yaml (Istio Gateway + DNSEndpoint)
# DNS managed by external-dns watching gateway-httproute source
#
# Webhook URLs:
#   https://argo-events.devopslaboratory.org/grafana-k6-custom  -> Forgejo EventSource
#   https://argo-events.devopslaboratory.org/iac-hetzner        -> Codeberg EventSource
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-webhook
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: http
  hostnames:
    - argo-events.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /iac-hetzner
      backendRefs:
        - name: codeberg-eventsource-svc
          port: 12001
          group: ""
          kind: Service
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /grafana-k6-custom
      backendRefs:
        - name: forgejo-eventsource-svc
          port: 12000
          group: ""
          kind: Service
          weight: 1
