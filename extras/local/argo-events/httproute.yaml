---
# HTTPRoute for Argo Events webhook endpoint - public access via Cloudflare Tunnel → kgateway
# DNS managed by external-dns (gateway-httproute source) using Cloudflare Tunnel CNAME as target
#
# Webhook URLs:
#   https://argo-events.devopslaboratory.org/grafana-k6-custom  -> Forgejo EventSource
#   https://argo-events.devopslaboratory.org/iac-hetzner        -> Codeberg EventSource
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-webhook
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    external-dns.alpha.kubernetes.io/target: d5854df6-8267-4a84-8d51-3431d4c0c15d.cfargotunnel.com
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https
    - name: homelab-gateway
      namespace: kgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: http
  hostnames:
    - argo-events.devopslaboratory.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /iac-hetzner
      backendRefs:
        - name: codeberg-eventsource-svc
          port: 12001
          group: ""
          kind: Service
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /grafana-k6-custom
      backendRefs:
        - name: forgejo-eventsource-svc
          port: 12000
          group: ""
          kind: Service
          weight: 1
