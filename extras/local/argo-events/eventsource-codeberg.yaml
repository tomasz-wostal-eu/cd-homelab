---
# EventSource for Codeberg (Gitea-compatible) webhooks
# Repository: ssh://git@codeberg.org/mistwolftech/iac-hetzner.git
#
# Webhook URLs:
#   - Push: https://argo-events.devopslaboratory.org/iac-hetzner/push
#   - PR:   https://argo-events.devopslaboratory.org/iac-hetzner/pr
#
# Separate webhooks needed in Codeberg for each event type
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: codeberg
  namespace: argo-events
spec:
  eventBusName: default
  webhook:
    # Push events - triggers plan for non-main branches
    iac-hetzner-push:
      port: "12001"
      endpoint: /iac-hetzner/push
      method: POST
      webhookSecret:
        name: argo-events-webhook-credentials
        key: codeberg-webhook-secret
      authSecret:
        name: argo-events-webhook-credentials
        key: codeberg-webhook-auth-token
    # Pull Request events - triggers plan/apply based on action
    iac-hetzner-pr:
      port: "12001"
      endpoint: /iac-hetzner/pr
      method: POST
      webhookSecret:
        name: argo-events-webhook-credentials
        key: codeberg-webhook-secret
      authSecret:
        name: argo-events-webhook-credentials
        key: codeberg-webhook-auth-token
---
# Service for the EventSource webhook endpoint
apiVersion: v1
kind: Service
metadata:
  name: codeberg-eventsource-svc
  namespace: argo-events
  labels:
    eventsource-name: codeberg
spec:
  type: ClusterIP
  ports:
    - port: 12001
      targetPort: 12001
      protocol: TCP
      name: webhook
  selector:
    eventsource-name: codeberg
    owner-name: codeberg
