# Argo Workflows homelab config

server:
  # Disable authentication
  authModes:
    - server
  extraArgs:
    - --auth-mode=server

# S3 artifact repository - Hetzner Object Storage
artifactRepository:
  archiveLogs: true
  s3:
    bucket: mw-argo-workflows
    endpoint: hel1.your-objectstorage.com
    region: hel1
    insecure: false
    accessKeySecret:
      name: argo-workflows-s3-credentials
      key: accesskey
    secretKeySecret:
      name: argo-workflows-s3-credentials
      key: secretkey

# PostgreSQL database configuration (CNPG)
# CNPG creates secret 'argo-workflows-db-app' automatically with username/password
controller:
  persistence:
    archive: true
    postgresql:
      host: argo-workflows-db-rw.argo-workflows.svc
      port: 5432
      database: argo_workflows
      tableName: argo_workflows
      userNameSecret:
        name: argo-workflows-db-app
        key: username
      passwordSecret:
        name: argo-workflows-db-app
        key: password
      ssl: false
