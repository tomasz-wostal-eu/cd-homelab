# Argo Workflows homelab config

server:
  # SSO authentication via Authentik
  authModes:
    - sso
  extraArgs:
    - --auth-mode=sso
  sso:
    enabled: true
    issuer: https://auth.devopslaboratory.org/application/o/argo-workflows/
    clientId:
      name: argo-workflows-sso
      key: client-id
    clientSecret:
      name: argo-workflows-sso
      key: client-secret
    redirectUrl: https://workflows.devopslaboratory.org/oauth2/callback
    scopes:
      - openid
      - email
      - profile
    rbac:
      enabled: true
    # Session expiry
    sessionExpiry: 240h
    # Whitelist secrets that server can read (for SSO RBAC tokens)
    secretWhitelist:
      - sso-admin-token

# S3 artifact repository - Hetzner Object Storage
artifactRepository:
  archiveLogs: true
  s3:
    bucket: mw-argo-workflows
    endpoint: hel1.your-objectstorage.com
    region: hel1
    insecure: false
    accessKeySecret:
      name: argo-workflows-s3-credentials
      key: accesskey
    secretKeySecret:
      name: argo-workflows-s3-credentials
      key: secretkey

# PostgreSQL database configuration (CNPG)
# CNPG creates secret 'argo-workflows-db-app' automatically with username/password
controller:
  # Retention policy - keep only last 3 workflows per status
  retentionPolicy:
    completed: 3
    failed: 3
    errored: 3

  # Default TTL for all workflows - cleanup after 24h
  workflowDefaults:
    spec:
      ttlStrategy:
        secondsAfterCompletion: 86400  # 24h
        secondsAfterSuccess: 86400
        secondsAfterFailure: 86400

  persistence:
    archive: true
    postgresql:
      host: argo-workflows-db-rw.argo-workflows.svc
      port: 5432
      database: argo_workflows
      tableName: argo_workflows
      userNameSecret:
        name: argo-workflows-db-app
        key: username
      passwordSecret:
        name: argo-workflows-db-app
        key: password
      ssl: false
