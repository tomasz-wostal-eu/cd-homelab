# Argo Workflows common config

# Controller configuration
controller:
  metricsConfig:
    enabled: true
    port: 9090
    path: /metrics
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

# Server configuration
server:
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2746"
    prometheus.io/path: "/metrics"
