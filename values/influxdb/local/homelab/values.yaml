# Homelab InfluxDB config
adminUser:
  organization: "homelab"
  bucket: "mqtt"
  user: "admin"
  existingSecret: homelab-influxdb-credentials

# Enable persistence to prevent data loss on pod restarts
persistence:
  enabled: true
  storageClass: nfs-rwx
  accessMode: ReadWriteMany
  size: 10Gi

# Security context for NFS compatibility (avoid chown permission errors)
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
