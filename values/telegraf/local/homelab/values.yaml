# Telegraf: EMQX MQTT → InfluxDB

# Load InfluxDB token from secret
envFromSecret: "homelab-telegraf-credentials"

config:
  agent:
    interval: "10s"
    round_interval: true
    metric_batch_size: 1000
    metric_buffer_limit: 10000
    flush_interval: "10s"
    flush_jitter: "0s"
    debug: false

  processors:
    # Extract fields from EMQX-wrapped payload for Zigbee metrics
    - starlark:
        namepass:
          - "zigbee"
        source: |
          load("json.star", "json")

          def apply(metric):
              # Get the payload field (EMQX wrapper contains original JSON here)
              payload_str = metric.fields.get("payload")
              if payload_str == None:
                  return metric

              # Parse the JSON payload
              payload = json.decode(payload_str)
              if payload == None:
                  return metric

              # Extract numeric fields - preserve original types to match InfluxDB schema
              numeric_fields = ["power", "energy", "voltage", "current", "linkquality", "temperature", "humidity"]
              for field in numeric_fields:
                  if field in payload:
                      val = payload[field]
                      if type(val) == "int" or type(val) == "float":
                          metric.fields[field] = val

              # Extract state as tag
              if "state" in payload:
                  metric.tags["state"] = str(payload["state"])

              # Remove the raw payload field (no longer needed)
              metric.fields.pop("payload")

              return metric

  outputs:
    - influxdb_v2:
        urls:
          - "http://influxdb-influxdb2.monitoring.svc.cluster.local:80"
        token: "$INFLUX_TOKEN"
        organization: "homelab"
        bucket: "mqtt"

  inputs:
    # Hydrosense aquarium data
    - mqtt_consumer:
        name_override: "hydrosense"
        servers:
          - "tcp://emqx.emqx.svc.cluster.local:1883"
        topics:
          - "hydrosense/+/+/state"
        qos: 1
        connection_timeout: "30s"
        persistent_session: true
        client_id: "telegraf-hydrosense"
        max_undelivered_messages: 1000
        data_format: "json"
        topic_tag: "topic"
        json_string_fields:
          - "mode"
          - "water_level"
          - "pump_state"
          - "current_level"
          - "next_action"

    # Zigbee2MQTT sensors (power, energy, temperature, etc.)
    # EMQX bridge wraps messages - starlark processor extracts payload
    - mqtt_consumer:
        name_override: "zigbee"
        servers:
          - "tcp://emqx.emqx.svc.cluster.local:1883"
        topics:
          - "zigbee2mqtt/+"
        qos: 1
        connection_timeout: "30s"
        persistent_session: true
        client_id: "telegraf-zigbee"
        max_undelivered_messages: 1000
        data_format: "json"
        topic_tag: "topic"
        json_string_fields:
          - "payload"

# Disable service - no inputs require exposed ports
service:
  enabled: false

# Pod annotations for Prometheus
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9273"
  prometheus.io/path: "/metrics"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
