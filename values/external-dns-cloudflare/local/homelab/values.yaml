# External DNS Cloudflare - homelab configuration

# Domain filters - add your Cloudflare managed domains
domainFilters:
  - "wostal.eu"
  - "devopslaboratory.org"

# Sources to watch for DNS records
# gateway-httproute: reads hostnames from HTTPRoute resources.
# Each HTTPRoute must have external-dns.alpha.kubernetes.io/target annotation
# pointing to the Cloudflare Tunnel CNAME (overrides private MetalLB IP).
sources:
  - service
  - ingress
  - crd
  - gateway-httproute

# Cloudflare provider
provider:
  name: cloudflare

# Enable Cloudflare proxy (orange cloud) for all records
# Required for Cloudflare Tunnel to work
extraArgs:
  - --cloudflare-proxied

# Sync policy - will create and delete records
policy: sync

# Cloudflare API token from ExternalSecret
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: cloudflare_api_token

# Log level
logLevel: info

# Interval between sync runs
interval: 1m

# TXT record owner ID
txtOwnerId: homelab
