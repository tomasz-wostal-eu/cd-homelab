# Cloudflared homelab configuration
# Ingress rules for services exposed via Cloudflare Tunnel

cloudflare:
  # Credentials from ExternalSecret
  secretName: cloudflared-credentials
  # Tunnel name (must match the tunnel in Cloudflare)
  tunnelName: homelab
  # Ingress rules - routed through tunnel
  ingress:
    # Routes traffic to envoy-gateway (replaced Istio homelab-gateway)
    # Service name follows envoy-gateway convention: envoy-{namespace}-{gateway-name}
    - hostname: grafana.devopslaboratory.org
      service: http://envoy-envoy-gateway-system-homelab-gateway.envoy-gateway-system.svc.cluster.local:80
    - hostname: auth.devopslaboratory.org
      service: http://envoy-envoy-gateway-system-homelab-gateway.envoy-gateway-system.svc.cluster.local:80
    - hostname: workflows.devopslaboratory.org
      service: http://envoy-envoy-gateway-system-homelab-gateway.envoy-gateway-system.svc.cluster.local:80
    - hostname: argo-events.devopslaboratory.org
      service: http://envoy-envoy-gateway-system-homelab-gateway.envoy-gateway-system.svc.cluster.local:80
    - hostname: cd.devopslaboratory.org
      service: http://envoy-envoy-gateway-system-homelab-gateway.envoy-gateway-system.svc.cluster.local:80
    # Chart adds catch-all rule automatically
