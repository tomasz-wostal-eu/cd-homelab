# Grafana homelab
persistence:
  enabled: false

admin:
  existingSecret: homelab-grafana-credentials
  userKey: admin-user
  passwordKey: admin-password

# Load secrets as env vars
envFromSecrets:
  - name: homelab-grafana-datasource-secrets
    optional: false
  - name: homelab-grafana-oauth
    optional: false

# Grafana configuration
grafana.ini:
  server:
    root_url: https://grafana.devopslaboratory.org
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    client_id: grafana
    client_secret: $__env{client-secret}
    scopes: openid email profile groups
    auth_url: https://auth.devopslaboratory.org/application/o/authorize/
    token_url: https://auth.devopslaboratory.org/application/o/token/
    api_url: https://auth.devopslaboratory.org/application/o/userinfo/
    # Map Authentik groups to Grafana roles
    role_attribute_path: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
    # Allow OAuth users to be org admins
    allow_assign_grafana_admin: true
  # Disable anonymous access when OAuth is configured
  auth:
    disable_login_form: false  # Keep login form for admin fallback

# Enable sidecar to auto-load dashboards from ConfigMaps
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /tmp/dashboards
    provider:
      foldersFromFilesStructure: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: InfluxDB
        type: influxdb
        uid: influxdb
        url: http://influxdb-influxdb2.monitoring.svc.cluster.local:80
        access: proxy
        isDefault: false
        jsonData:
          version: Flux
          organization: homelab
          defaultBucket: mqtt
        secureJsonData:
          token: $__env{influxdb-token}
      - name: Prometheus
        type: prometheus
        uid: Prometheus
        url: http://victoria-metrics-victoria-metrics-single-server.monitoring.svc:8428
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Prometheus-Direct
        type: prometheus
        uid: prometheus-direct
        url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
        jsonData:
          maxLines: 1000
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc:3200
        access: proxy
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
