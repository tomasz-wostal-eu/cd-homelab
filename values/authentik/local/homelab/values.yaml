---
# Homelab-specific values for Authentik

# Server configuration for homelab (single replica)
server:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Mount custom blueprints
  volumes:
    - name: blueprints-grafana
      configMap:
        name: authentik-blueprint-grafana
  volumeMounts:
    - name: blueprints-grafana
      mountPath: /blueprints/custom/grafana.yaml
      subPath: grafana.yaml

# Worker configuration for homelab (single replica)
worker:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Mount custom blueprints (worker applies blueprints)
  volumes:
    - name: blueprints-grafana
      configMap:
        name: authentik-blueprint-grafana
  volumeMounts:
    - name: blueprints-grafana
      mountPath: /blueprints/custom/grafana.yaml
      subPath: grafana.yaml

# Redis resources for homelab
redis:
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
