---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hydrohabitat
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: homelab
            cluster: https://kubernetes.default.svc
            namespace: hydrohabitat
            helmRevision: "main"
            env: homelab
            region: local
            type: homelab
          - name: pr
            cluster: https://kubernetes.default.svc
            namespace: hydrohabitat-pr
            helmRevision: "main"
            env: pr
            region: local
            type: homelab
          - name: dev
            cluster: https://kubernetes.default.svc
            namespace: hydrohabitat-dev
            helmRevision: "main"
            env: dev
            region: local
            type: homelab
          - name: qa
            cluster: https://kubernetes.default.svc
            namespace: hydrohabitat-qa
            helmRevision: "main"
            env: qa
            region: local
            type: homelab
          - name: prod
            cluster: https://kubernetes.default.svc
            namespace: hydrohabitat-prod
            helmRevision: "main"
            env: prod
            region: local
            type: homelab
  template:
    metadata:
      name: hydrohabitat-{{ .name }}
      labels:
        app.kubernetes.io/name: hydrohabitat
        app.kubernetes.io/instance: hydrohabitat-{{ .name }}
        env: "{{ .env }}"
        cluster: "{{ .name }}"
        region: "{{ .region }}"
        type: "{{ .type }}"
      annotations:
        homelab.argocd.io/cluster-url: "{{ .cluster }}"
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: apps
      sources:
        - repoURL: git@github.com:tomasz-wostal-eu/hydrohabitat.git
          targetRevision: "{{ .helmRevision }}"
          path: helm/hydrohabitat
          helm:
            releaseName: hydrohabitat
            valueFiles:
              - $values/values/hydrohabitat/common/values.yaml
              - $values/values/hydrohabitat/{{ .region }}/{{ .env }}/values.yaml
        - repoURL: git@github.com:tomasz-wostal-eu/cd-homelab.git
          targetRevision: main
          path: extras/{{ .region }}/hydrohabitat
          directory:
            recurse: true
        - repoURL: git@github.com:tomasz-wostal-eu/cd-homelab.git
          targetRevision: main
          ref: values
      destination:
        server: "{{ .cluster }}"
        namespace: "{{ .namespace }}"
      revisionHistoryLimit: 5
      info:
        - name: Region
          value: "{{ .region }}"
        - name: Environment
          value: "{{ .env }}"
        - name: Type
          value: "{{ .type }}"
        - name: Chart Version
          value: "{{ .helmRevision }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 10m
        managedNamespaceMetadata:
          labels:
            owner: argocd
            app.kubernetes.io/part-of: hydrohabitat
            region: "{{ .region }}"
            env: "{{ .env }}"
            kargo.akuity.io/project: "true"
          annotations:
            argocd.argoproj.io/managed-by: "hydrohabitat-{{ .name }}"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=false
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - PrunePropagationPolicy=foreground
          - RespectIgnoreDifferences=true
