---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kgateway-crds
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: homelab
            cluster: https://kubernetes.default.svc
            namespace: kgateway-system
            helmRevision: "v2.2.2"
            env: homelab
            region: local
            type: homelab
  template:
    metadata:
      name: kgateway-crds-{{ .name }}
      labels:
        app.kubernetes.io/name: kgateway-crds
        app.kubernetes.io/instance: kgateway-crds-{{ .name }}
        env: "{{ .env }}"
        cluster: "{{ .name }}"
        region: "{{ .region }}"
        type: "{{ .type }}"
      annotations:
        homelab.argocd.io/cluster-url: "{{ .cluster }}"
        argocd.argoproj.io/sync-wave: "-2"
    spec:
      project: platform-networking
      source:
        repoURL: cr.kgateway.dev/kgateway-dev/charts
        chart: kgateway-crds
        targetRevision: "{{ .helmRevision }}"
        helm:
          releaseName: kgateway-crds
      destination:
        server: "{{ .cluster }}"
        namespace: "{{ .namespace }}"
      revisionHistoryLimit: 5
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 10m
        managedNamespaceMetadata:
          labels:
            owner: argocd
            app.kubernetes.io/part-of: kgateway
            region: "{{ .region }}"
            env: "{{ .env }}"
          annotations:
            argocd.argoproj.io/managed-by: "kgateway-crds-{{ .name }}"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - PrunePropagationPolicy=foreground
          - RespectIgnoreDifferences=true
